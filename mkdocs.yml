site_name: SDD
site_description: Introduction to reinforcement learning class, given at ISAE-Supaero
site_url: https://supaerodatascience.github.io/reinforcement-learning/
site_dir: site
strict: false
use_directory_urls: false

theme:
  name: 'material'
  palette:
    primary: light blue
    accent: light blue
  logo: 'https://raw.githubusercontent.com/SupaeroDataScience/reinforcement-learning/master/favicon.ico'
  favicon: 'https://raw.githubusercontent.com/SupaeroDataScience/reinforcement-learning/master/favicon.ico'
  features:
    - toc.autohide
    - navigation.sections

repo_name: SupaeroDataScience/reinforcement-learning
repo_url: https://github.com/SupaeroDataScience/reinforcement-learning

nav:
- Home: https://supaerodatascience.github.io/index.html

- Classes:
  - Fundamentals of Decision Making: https://supaerodatascience.github.io/310/index.html
  
  - Machine Learning: 
    - Overview: https://supaerodatascience.github.io/aml.html
    - Machine Learning: https://supaerodatascience.github.io/machine-learning/
    - Deep Larning: https://supaerodatascience.github.io/deep-learning/
    - Reinforcement learning: index.md

  - Data Engineering: https://supaerodatascience.github.io/DE/

  - Applied Data Science: https://supaerodatascience.github.io/313/index.html

  - Seminars: https://supaerodatascience.github.io/seminars.html

- Resources:
  - For current students: https://supaerodatascience.github.io/infostudents.html
  - For prospective students: https://supaerodatascience.github.io/students.html
  - For partners: https://supaerodatascience.github.io/partners.html
  - Contact: https://supaerodatascience.github.io/contact.html

markdown_extensions:
- markdown.extensions.codehilite:
    guess_lang: false
- toc:
    permalink: 🔗
- admonition
- codehilite
- extra
- attr_list
- pymdownx.details
- pymdownx.superfences
- pymdownx.snippets:
    check_paths: true
    auto_append: []

plugins:
- search
